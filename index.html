<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kish & Glydel | Wedding Film</title>

<style>
body {
  margin: 0;
  background: linear-gradient(to bottom, #f5efe6, #e8dccb);
  color: #4b3b2a;
  font-family: 'Georgia', serif;
  overflow: hidden;
}

/* 🌿 BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #f5efe6, #e0d3c0);
  z-index: -3;
}

/* 🎬 SCENES */
.scene {
  position: fixed;
  width: 100%;
  height: 100%;
  opacity: 0;
  transform: scale(1.05);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  transition: all 1.2s ease;
  pointer-events: none;
}

.scene.active {
  opacity: 1;
  transform: scale(1);
  pointer-events: all;
}

/* 🎥 VIDEO */
video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7) sepia(20%);
}

/* 🌿 TITLE */
.title {
  font-size: 42px;
  color: #8b6f47;
}

/* ✨ TEXT */
.narration {
  max-width: 320px;
  font-size: 16px;
  line-height: 1.6;
  margin-top: 15px;
}

/* 🪵 CARD */
.card {
  max-width: 340px;
  padding: 22px;
  background: rgba(255,255,255,0.6);
  border-radius: 18px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(139,111,71,0.2);
}

/* 🌿 BUTTON */
.btn {
  margin-top: 12px;
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: #8b6f47;
  color: white;
  cursor: pointer;
}

/* 🌸 SLIDESHOW */
.slideshow {
  position: relative;
  width: 90%;
  max-width: 320px;
  height: 220px;
  overflow: hidden;
  border-radius: 16px;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 1.5s ease;
}

.slide.active {
  opacity: 1;
}

/* 🌿 COUNTDOWN */
#countdown {
  margin-top: 15px;
  font-size: 18px;
  color: #8b6f47;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- 🎵 MUSIC -->
<audio id="music" preload="auto"></audio>

<!-- 🎥 INTRO -->
<div class="scene active" id="sceneintro">

  <video autoplay muted playsinline>
    <source src="prenup.mp4" type="video/mp4">
  </video>

  <div style="position:absolute;">
    <div class="title">Kish & Glydel</div>

    <div class="narration">
      Welcome to our wedding story
    </div>

    <button class="btn" onclick="start()">Enter</button>
  </div>
</div>

<!-- 💍 SCENE 2 -->
<div class="scene" id="scene2">
  <div class="card">
    <h2>Our Beginning</h2>

    <!-- 🌸 SLIDESHOW -->
    <div class="slideshow">
      <img class="slide active" src="photo1.jpg">
      <img class="slide" src="photo2.jpg">
      <img class="slide" src="photo3.jpg">
    </div>

    <div class="narration">
      A story that started with a simple hello…
    </div>

    <button class="btn" onclick="next()">Continue</button>
  </div>
</div>

<!-- ⏳ SCENE 3 -->
<div class="scene" id="scene3">
  <div class="card">
    <h2>The Wedding Day</h2>

    <div class="narration">
      May 09, 2026 • 3:00 PM<br>
      Hila’s Residence
    </div>

    <div id="countdown"></div>

    <button class="btn" onclick="next()">Gallery</button>
  </div>
</div>

<!-- 📸 SCENE 4 -->
<div class="scene" id="scene4">
  <div class="card">
    <h2>Our Moments</h2>

    <div class="slideshow">
      <img class="slide active" src="photo1.jpg">
      <img class="slide" src="photo2.jpg">
      <img class="slide" src="photo3.jpg">
    </div>

    <button class="btn" onclick="next()">Final</button>
  </div>
</div>

<!-- 💍 FINAL -->
<div class="scene" id="scene5">
  <div class="card">
    <h2>See You There</h2>

    <div class="narration">
      We can’t wait to celebrate with you.<br><br>
      — Kish & Glydel
    </div>
  </div>
</div>

<script>

let current = 1;

// 🎬 START
function start(){
  playMusic();
  show(2);
}

// 🎬 NAVIGATION
function show(n){
  document.querySelectorAll(".scene").forEach(s=>s.classList.remove("active"));
  document.getElementById("scene"+n).classList.add("active");
}

function next(){
  current++;
  show(current);
}

// 🎵 MUSIC
function playMusic(){
  const m = document.getElementById("music");
  m.src = "prenup.mp3";
  m.volume = 0;
  m.play().catch(()=>{});

  let v = 0;
  let fade = setInterval(()=>{
    if(v < 0.5){
      v += 0.05;
      m.volume = v;
    } else clearInterval(fade);
  },100);
}

// 🌸 SLIDESHOW
setInterval(()=>{
  document.querySelectorAll(".slideshow").forEach(slideshow=>{
    const slides = slideshow.querySelectorAll(".slide");
    let active = 0;

    slides.forEach((s,i)=>{
      if(s.classList.contains("active")) active = i;
      s.classList.remove("active");
    });

    slides[(active+1)%slides.length].classList.add("active");
  });
},3000);

// ⏳ COUNTDOWN
const date = new Date("May 09, 2026 15:00:00").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const d = date - now;

  if(d < 0){
    document.getElementById("countdown").innerHTML = "💍 Today is the day!";
    return;
  }

  const days = Math.floor(d/(1000*60*60*24));
  const hrs = Math.floor((d%(1000*60*60*24))/(1000*60*60));
  const mins = Math.floor((d%(1000*60*60))/(1000*60));
  const sec = Math.floor((d%(1000*60))/1000);

  document.getElementById("countdown").innerHTML =
    `${days}d ${hrs}h ${mins}m ${sec}s`;
},1000);

</script>

</body>
</html>
