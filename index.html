<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kish & Glydel Wedding</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(to bottom, #fdf6f0, #f7e7dc);
  text-align: center;
  color: #333;
  overflow-x: hidden;
}

/* 🌸 PETALS */
.petal {
  position: fixed;
  top: -10px;
  width: 10px;
  height: 10px;
  background: pink;
  border-radius: 50%;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}

/* Overlay */
#musicOverlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000000cc;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

/* Content */
.container {
  padding: 30px;
}

h1 { font-size: 42px; }
.names { font-size: 34px; color: #b76e79; }
.details { font-size: 18px; }

#countdown {
  font-size: 26px;
  margin-top: 20px;
}

/* Fade animation */
.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: 1.5s ease;
}
.fade.show {
  opacity: 1;
  transform: translateY(0);
}

.delay-1 { transition-delay: 0.5s; }
.delay-2 { transition-delay: 1s; }
.delay-3 { transition-delay: 1.5s; }

/* Gallery */
.gallery img {
  width: 90%;
  max-width: 300px;
  margin: 10px;
  border-radius: 12px;
}

/* Buttons */
button, .btn {
  padding: 12px 20px;
  background: #b76e79;
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 10px;
  display: inline-block;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- 🌸 PETALS CONTAINER -->
<div id="petals"></div>

<!-- 🎵 OVERLAY -->
<div id="musicOverlay">
  <h2>Welcome to Our Wedding</h2>
  <button onclick="startExperience()">Enter</button>
</div>

<div class="container">

<h1 class="fade">You're Invited</h1>

<div class="names fade delay-1">Kish & Glydel</div>

<div class="details fade delay-2">
May 09, 2026<br>
3:00 PM<br><br>
Hila's Residence
</div>

<div id="countdown" class="fade delay-3"></div>

<!-- 📍 MAP -->
<div class="fade delay-3">
  <h3>Location</h3>
  <iframe 
    src="<iframe src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d15551.381950086976!2d124.01012476738282!3d12.981732673915644!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zMTLCsDU5JzM2LjIiTiAxMjTCsDAyJzE2LjEiRQ!5e0!3m2!1sen!2sph!4v1776776602995!5m2!1sen!2sph" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>"
    width="100%" height="250" style="border:0;" loading="lazy">
  </iframe>
</div>

<!-- 📩 RSVP -->
<div class="fade delay-3">
  <h3>RSVP</h3>
  <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLSeDr5oDuW-zchdjyluh25x_yBvxEZwGTUcqQTq1S87HJQ5WyA/viewform?usp=header" target="_blank">
    Confirm Attendance
  </a>
</div>

<!-- 📸 GALLERY -->
<div class="gallery fade delay-3">
  <h3>Our Moments</h3>
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
</div>

</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// 🎬 START
function startExperience() {
  document.getElementById("bgMusic").play();
  document.getElementById("musicOverlay").style.display = "none";

  document.querySelectorAll(".fade").forEach(el => {
    el.classList.add("show");
  });

  createPetals();
}

// ⏳ COUNTDOWN
const weddingDate = new Date("May 09, 2026 15:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const d = weddingDate - now;

  if (d < 0) return;

  const days = Math.floor(d / (1000*60*60*24));
  const hours = Math.floor((d % (1000*60*60*24))/(1000*60*60));
  const minutes = Math.floor((d % (1000*60*60))/(1000*60));
  const seconds = Math.floor((d % (1000*60))/1000);

  document.getElementById("countdown").innerHTML =
    days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}, 1000);

// 🌸 PETALS
function createPetals() {
  const container = document.getElementById("petals");

  setInterval(() => {
    const petal = document.createElement("div");
    petal.classList.add("petal");

    petal.style.left = Math.random() * 100 + "vw";
    petal.style.animationDuration = (3 + Math.random() * 5) + "s";

    container.appendChild(petal);

    setTimeout(() => petal.remove(), 8000);
  }, 300);
}

</script>

</body>
</html>
