<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kish & Glydel | Wedding Film</title>

<style>
body{
  margin:0;
  background:#f5efe6;
  font-family:'Georgia',serif;
  color:#4a3f35;
  overflow:hidden;
}

/* 🌿 BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:
    linear-gradient(rgba(245,239,230,0.85),rgba(245,239,230,0.9)),
    url('wood.jpg');
  background-size:cover;
  z-index:-3;
}

/* 🍃 FALLING LEAVES */
.leaf{
  position:fixed;
  width:18px;
  height:18px;
  background:url('leaf.png');
  background-size:cover;
  opacity:0.6;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-10vh) rotate(0deg);}
  100%{transform:translateY(110vh) rotate(360deg);}
}

/* 🎬 SCENE */
.scene{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  opacity:0;
  transition:1s;
}
.scene.active{opacity:1}

/* 🎞️ TITLE */
.title{
  font-size:46px;
  color:#8b5e3c;
  letter-spacing:2px;
}

/* 🪵 CARD */
.card{
  background:rgba(255,255,255,0.85);
  padding:20px;
  border-radius:14px;
  border:2px solid #d2b48c;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

/* 📸 POLAROID */
.polaroid{
  width:130px;
  background:white;
  padding:8px;
  margin:10px;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
  transform:rotate(-2deg);
  animation:float 6s ease-in-out infinite;
}
.polaroid:nth-child(2){transform:rotate(3deg)}
.polaroid img{width:100%}

@keyframes float{
  0%,100%{transform:translateY(0) rotate(-2deg)}
  50%{transform:translateY(-10px) rotate(2deg)}
}

/* 🎞️ SLIDER */
.slider{
  position:relative;
  width:260px;
  height:180px;
  overflow:hidden;
  border-radius:10px;
}
.slide{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  animation:slideShow 18s infinite;
}
.slide:nth-child(1){animation-delay:0s}
.slide:nth-child(2){animation-delay:6s}
.slide:nth-child(3){animation-delay:12s}

@keyframes slideShow{
  0%{opacity:0; transform:scale(1)}
  10%{opacity:1}
  40%{opacity:1; transform:scale(1.1)}
  60%{opacity:0}
  100%{opacity:0}
}

/* 🎬 BUTTON */
.btn{
  margin-top:12px;
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background:#8b5e3c;
  color:white;
  cursor:pointer;
}

/* ⏳ COUNTDOWN */
#countdown{
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- 🍃 LEAVES SCRIPT -->
<script>
for(let i=0;i<15;i++){
  let l=document.createElement("div");
  l.className="leaf";
  l.style.left=Math.random()*100+"vw";
  l.style.animationDuration=(6+Math.random()*8)+"s";
  document.body.appendChild(l);
}
</script>

<!-- 🎵 MUSIC -->
<audio id="music" src="prenup.mp3"></audio>

<!-- 🎬 INTRO -->
<div class="scene active" id="sceneintro">
  <div class="title">Kish & Glydel</div>
  <p>A love story written in time 🌿</p>
  <button class="btn" onclick="start()">Enter</button>
</div>

<!-- 💍 STORY -->
<div class="scene" id="scene2">
  <div class="card">
    <h2>The Beginning</h2>

    <div style="display:flex;">
      <div class="polaroid"><img src="photo1.jpg"></div>
      <div class="polaroid"><img src="photo2.jpg"></div>
    </div>

    <button class="btn" onclick="go(3)">Continue</button>
  </div>
</div>

<!-- 🎞️ SLIDER SCENE -->
<div class="scene" id="scene3">
  <div class="card">
    <h2>The Journey</h2>

    <div class="slider">
      <div class="slide" style="background-image:url('photo3.jpg')"></div>
      <div class="slide" style="background-image:url('photo4.jpg')"></div>
      <div class="slide" style="background-image:url('photo5.jpg')"></div>
    </div>

    <button class="btn" onclick="go(4)">Next</button>
  </div>
</div>

<!-- ⏳ COUNTDOWN -->
<div class="scene" id="scene4">
  <div class="card">
    <h2>Forever Begins</h2>
    <div id="countdown"></div>
    <button class="btn" onclick="go(5)">Venue</button>
  </div>
</div>

<!-- 📍 VENUE -->
<div class="scene" id="scene5">
  <div class="card">
    <h2>Venue</h2>
    <iframe src="https://www.google.com/maps?q=12.993418,124.037609&z=17&output=embed"
    width="100%" height="200"></iframe>
    <button class="btn" onclick="go(6)">End</button>
  </div>
</div>

<!-- 💍 END -->
<div class="scene" id="scene6">
  <div class="card">
    <h2>See You There 🌿</h2>
    <p>— Kish & Glydel</p>
  </div>
</div>

<script>

// 🎬 START (with music fade)
function start(){
  go(2);
  const m=document.getElementById("music");
  m.volume=0;
  m.play().catch(()=>{});
  let v=0;
  let fade=setInterval(()=>{
    if(v<0.6){v+=0.05; m.volume=v;}
    else clearInterval(fade);
  },100);
}

// 🎬 NAV
function go(n){
  document.querySelectorAll(".scene").forEach(s=>s.classList.remove("active"));
  document.getElementById("scene"+n).classList.add("active");
}

// ⏳ COUNTDOWN
const d=new Date("May 09, 2026 15:00:00").getTime();
setInterval(()=>{
  let now=new Date().getTime();
  let diff=d-now;

  if(diff<0){countdown.innerHTML="💍 Wedding Day";return;}

  let days=Math.floor(diff/(1000*60*60*24));
  let hrs=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  let min=Math.floor((diff%(1000*60*60))/(1000*60));
  let sec=Math.floor((diff%(1000*60))/1000);

  countdown.innerHTML=`${days}d ${hrs}h ${min}m ${sec}s`;
},1000);

</script>

</body>
</html>
