<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(to bottom, #fdf6f0, #f7e7dc);
  text-align: center;
  color: #333;
}

/* Overlay */
#musicOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000000cc;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

button {
  padding: 14px 24px;
  font-size: 16px;
  background: #b76e79;
  color: white;
  border: none;
  border-radius: 10px;
}

/* Content */
.container {
  padding: 30px;
}

h1 {
  font-size: 42px;
  margin-top: 40px;
}

.names {
  font-size: 34px;
  margin: 20px 0;
  color: #b76e79;
}

.details {
  font-size: 18px;
  margin: 20px 0;
}

/* Countdown */
#countdown {
  font-size: 26px;
  margin-top: 25px;
  color: #444;
}

/* Footer */
.footer {
  margin-top: 40px;
  font-size: 14px;
  color: #777;
}

/* ✨ Animation */
.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* Delays */
.delay-1 { transition-delay: 0.5s; }
.delay-2 { transition-delay: 1s; }
.delay-3 { transition-delay: 1.5s; }
.delay-4 { transition-delay: 2s; }

</style>
</head>

<body>

<!-- 🎵 MUSIC OVERLAY -->
<div id="musicOverlay">
  <h2>Welcome to Our Wedding</h2>
  <button onclick="startExperience()">Enter Invitation</button>
</div>

<!-- 💍 MAIN CONTENT -->
<div class="container">

  <h1 class="fade">You're Invited</h1>

  <div class="names fade delay-1">
    Kish & Glydel
  </div>

  <div class="details fade delay-2">
    Together with their families,<br><br>
    invite you to celebrate their wedding<br><br>

    <strong>May 09, 2026</strong><br>
    3:00 PM<br><br>

    Hila's Residence
  </div>

  <div id="countdown" class="fade delay-3"></div>

  <div class="footer fade delay-4">
    We can’t wait to celebrate with you 💕
  </div>

</div>

<!-- 🎵 BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// 🎬 START EXPERIENCE
function startExperience() {
  const music = document.getElementById("bgMusic");
  music.play();

  document.getElementById("musicOverlay").style.display = "none";

  startAnimations();
}

// ✨ ANIMATION TRIGGER
function startAnimations() {
  document.querySelectorAll(".fade").forEach(el => {
    el.classList.add("show");
  });
}

// 🎵 AUTOPLAY TRY
window.addEventListener("load", () => {
  const music = document.getElementById("bgMusic");

  music.play().then(() => {
    document.getElementById("musicOverlay").style.display = "none";
    startAnimations();
  }).catch(() => {
    // mobile fallback
  });
});

// ⏳ COUNTDOWN
const weddingDate = new Date("May 09, 2026 15:00:00").getTime();

const countdownFunction = setInterval(() => {
  const now = new Date().getTime();
  const distance = weddingDate - now;

  if (distance < 0) {
    clearInterval(countdownFunction);
    document.getElementById("countdown").innerHTML = "🎉 It's Wedding Time!";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
}, 1000);

</script>

</body>
</html>
