<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kish & Glydel Wedding</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: radial-gradient(circle at top, #fff8f3, #f7e7dc);
  text-align: center;
  overflow-x: hidden;
}

/* 🌟 GLOW */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,215,0,0.08), transparent);
  z-index: -1;
}

/* 📜 ENVELOPE */
#envelope {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #f5e6d3;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 1000;
}

.flap {
  width: 200px;
  height: 120px;
  background: #e0c3a0;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transition: transform 1.5s;
  transform-origin: top;
}

.letter {
  width: 200px;
  height: 120px;
  background: white;
  margin-top: -60px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 🌸 PETALS */
.petal {
  position: fixed;
  top: -10px;
  width: 8px;
  height: 8px;
  background: #ffc0cb;
  border-radius: 50%;
  opacity: 0.6;
  animation: fall linear infinite;
}
@keyframes fall {
  to { transform: translateY(100vh) translateX(40px) rotate(360deg); }
}

/* 💍 RING */
.ring {
  width: 120px;
  height: 120px;
  border: 3px solid gold;
  border-radius: 50%;
  margin: auto;
  animation: spin 10s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ✨ NAMES */
.names {
  font-size: 38px;
  font-weight: bold;
  background: linear-gradient(90deg, #d4af37, #fff5cc, #d4af37);
  -webkit-background-clip: text;
  color: transparent;
  animation: shimmer 3s linear infinite;
}
@keyframes shimmer {
  to { background-position: 200% center; }
}

/* 🎞️ FADE */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 2s ease;
}
.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* BUTTON */
.btn {
  padding: 12px 20px;
  background: linear-gradient(45deg, #b76e79, #d4af37);
  color: white;
  border-radius: 10px;
  text-decoration: none;
}

/* GALLERY */
.gallery img {
  width: 90%;
  max-width: 300px;
  margin: 10px;
  border-radius: 12px;
}

</style>
</head>

<body>

<div id="petals"></div>

<!-- 📜 ENVELOPE -->
<div id="envelope">
  <div class="flap" id="flap"></div>
  <div class="letter">
    <button onclick="openInvite()">Open Invitation</button>
  </div>
</div>

<div class="container">

<h1 class="fade">You're Invited</h1>

<div class="ring fade"></div>

<div class="names fade">Kish & Glydel</div>

<div class="fade">
May 09, 2026<br>
3:00 PM<br><br>
Hila's Residence
</div>

<div id="countdown" class="fade"></div>

<!-- 📍 MAP -->
<div class="fade">
<h3>Location</h3>
<iframe 
src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d268.39342950434235!2d124.03760950743883!3d12.993418406871323!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zMTLCsDU5JzM2LjIiTiAxMjTCsDAyJzE2LjEiRQ!5e0!3m2!1sen!2sph!4v1776776870268!5m2!1sen!2sph"
width="100%" height="250" style="border:0;">
</iframe>
</div>

<!-- 📩 RSVP -->
<div class="fade">
<h3>RSVP</h3>
<a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLSeDr5oDuW-zchdjyluh25x_yBvxEZwGTUcqQTq1S87HJQ5WyA/viewform" target="_blank">
Confirm Attendance
</a>
</div>

<!-- 📸 GALLERY -->
<div class="gallery fade">
<h3>Our Moments</h3>
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
</div>

</div>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// 📜 OPEN ENVELOPE
function openInvite() {
  document.getElementById("flap").style.transform = "rotateX(180deg)";

  setTimeout(() => {
    document.getElementById("envelope").style.display = "none";

    document.getElementById("bgMusic").play();

    document.querySelectorAll(".fade").forEach((el, i) => {
      setTimeout(() => el.classList.add("show"), i * 400);
    });

    createPetals();
  }, 1500);
}

// ⏳ COUNTDOWN
const weddingDate = new Date("May 09, 2026 15:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const d = weddingDate - now;

  if (d < 0) return;

  document.getElementById("countdown").innerHTML =
    Math.floor(d/(1000*60*60*24))+"d "+
    Math.floor((d%(1000*60*60*24))/(1000*60*60))+"h "+
    Math.floor((d%(1000*60*60))/(1000*60))+"m "+
    Math.floor((d%(1000*60))/1000)+"s";
},1000);

// 🌸 PETALS
function createPetals() {
  setInterval(() => {
    const p = document.createElement("div");
    p.className = "petal";
    p.style.left = Math.random()*100+"vw";
    p.style.animationDuration = (5+Math.random()*5)+"s";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),10000);
  },400);
}

</script>

</body>
</html>
