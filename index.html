<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kish & Glydel Wedding Story</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: black;
  overflow: hidden;
  color: white;
}

/* 🌌 background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle,#111,#000);
  z-index: -2;
}

/* 🎬 scenes */
.scene {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  opacity: 0;
  transform: scale(1.05);
  filter: blur(10px);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  transition: all 1s ease;
  pointer-events: none;
}

.scene.active {
  opacity: 1;
  transform: scale(1);
  filter: blur(0);
  pointer-events: all;
}

/* 🎥 video */
#introVideo {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 💍 text */
.title {
  font-size: 42px;
  background: linear-gradient(90deg,#d4af37,#fff5cc,#d4af37);
  -webkit-background-clip: text;
  color: transparent;
}

.subtitle {
  font-size: 14px;
  opacity: 0.8;
}

/* 📸 image */
.story-img {
  width: 85%;
  max-width: 320px;
  border-radius: 15px;
  margin-top: 15px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: scale(1.05);}
  to {opacity:1; transform: scale(1);}
}

/* 🪶 card */
.card {
  max-width: 320px;
  padding: 20px;
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  backdrop-filter: blur(10px);
}

/* 🎬 button */
.btn {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  background: linear-gradient(45deg,#b76e79,#d4af37);
  color: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- 🎥 SCENE 1: VIDEO INTRO -->
<div class="scene active" id="scene1">

  <video id="introVideo" autoplay muted playsinline>
    <source src="prenup.mp4" type="video/mp4">
  </video>

  <div style="position:absolute;">
    <div class="title">Kish & Glydel</div>
    <div class="subtitle">Our Love Story Begins</div>
    <button class="btn" onclick="nextScene()">Start Story</button>
  </div>
</div>

<!-- 💌 SCENE 2 -->
<div class="scene" id="scene2">
  <div class="card">
    <h2>💌 Invitation</h2>
    <img class="story-img" src="photo1.jpg">
    <p>A journey written in love.</p>
    <button class="btn" onclick="nextScene()">Continue</button>
  </div>
</div>

<!-- 💍 SCENE 3 -->
<div class="scene" id="scene3">
  <div class="card">
    <h2>💍 Our Story</h2>
    <img class="story-img" src="photo2.jpg">
    <p>From strangers → soulmates</p>
    <button class="btn" onclick="nextScene()">Continue</button>
  </div>
</div>

<!-- 📅 SCENE 4 -->
<div class="scene" id="scene4">
  <div class="card">
    <h2>📅 Wedding Day</h2>
    <img class="story-img" src="photo3.jpg">
    <p>May 09, 2026<br>3:00 PM</p>
    <button class="btn" onclick="nextScene()">Location</button>
  </div>
</div>

<!-- 📍 SCENE 5 -->
<div class="scene" id="scene5">
  <div class="card">
    <h2>📍 Hila's Residence</h2>
    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d268.39342950434235!2d124.03760950743883!3d12.993418406871323"
      width="100%" height="200" style="border:0;">
    </iframe>
    <button class="btn" onclick="nextScene()">RSVP</button>
  </div>
</div>

<!-- 📩 SCENE 6 -->
<div class="scene" id="scene6">
  <div class="card">
    <h2>📩 RSVP</h2>
    <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLSeDr5oDuW-zchdjyluh25x_yBvxEZwGTUcqQTq1S87HJQ5WyA/viewform" target="_blank">
      Confirm Attendance
    </a>
    <button class="btn" onclick="nextScene()">Finish</button>
  </div>
</div>

<!-- 🎉 SCENE 7 -->
<div class="scene" id="scene7">
  <div class="card">
    <h2>✨ Thank You</h2>
    <p>Kish & Glydel<br>Forever Begins Here</p>
  </div>
</div>

<script>

let current = 1;
const total = 7;

function showScene(n){
  document.querySelectorAll(".scene").forEach(s=>s.classList.remove("active"));
  document.getElementById("scene"+n).classList.add("active");
}

function nextScene(){
  if(current < total){
    current++;
    showScene(current);
  }
}

/* 🎥 auto video → story */
window.addEventListener("load",()=>{
  const v = document.getElementById("introVideo");

  v.play().catch(()=>{});

  v.onended = () => {
    nextScene();
  };
});

</script>

</body>
</html>
