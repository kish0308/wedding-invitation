<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(to bottom, #fdf6f0, #f7e7dc);
  text-align: center;
  color: #333;
}

.container {
  padding: 30px;
}

h1 {
  font-size: 40px;
  margin-top: 40px;
}

.names {
  font-size: 32px;
  margin: 20px 0;
  color: #b76e79;
}

.details {
  font-size: 18px;
  margin: 20px 0;
}

/* Countdown */
#countdown {
  font-size: 24px;
  margin-top: 20px;
  color: #444;
}

/* Music overlay */
#musicOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000000cc;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

button {
  padding: 12px 20px;
  font-size: 16px;
  background: #b76e79;
  color: white;
  border: none;
  border-radius: 8px;
}

.footer {
  margin-top: 40px;
  font-size: 14px;
  color: #777;
}
</style>

</head>
<body>

<!-- Music Overlay -->
<div id="musicOverlay">
  <h2>Tap to Open Invitation</h2>
  <button onclick="startMusic()">Enter</button>
</div>

<div class="container">
  <h1>You're Invited</h1>

  <div class="names">
    Kish & Glydel
  </div>

  <div class="details">
    Together with their families,<br><br>
    invite you to celebrate their wedding<br><br>

    <strong>May 09, 2026</strong><br>
    3:00 PM<br><br>

    Hila's residence <br>
    Wedding & Reception
  </div>

  <!-- Countdown -->
  <div id="countdown"></div>

  <div class="footer">
    We can’t wait to celebrate with you 💕
  </div>
</div>

<!-- Music -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// 🎵 MUSIC CONTROL (mobile-safe)
function startMusic() {
  const music = document.getElementById("bgMusic");
  music.play();
  document.getElementById("musicOverlay").style.display = "none";
}

// Try autoplay (will fail silently on mobile)
window.addEventListener("load", () => {
  const music = document.getElementById("bgMusic");
  music.play().then(() => {
    document.getElementById("musicOverlay").style.display = "none";
  }).catch(() => {
    // Autoplay blocked → overlay stays
  });
});


// ⏳ COUNTDOWN TIMER
const weddingDate = new Date("May 09, 2026 15:00:00").getTime();

const countdownFunction = setInterval(() => {
  const now = new Date().getTime();
  const distance = weddingDate - now;

  if (distance < 0) {
    clearInterval(countdownFunction);
    document.getElementById("countdown").innerHTML = "🎉 It's Wedding Time!";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
}, 1000);
</script>

</body>
</html>
