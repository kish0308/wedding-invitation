<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(to bottom, #fdf6f0, #f7e7dc);
  text-align: center;
  color: #333;
}

.container {
  padding: 30px;
}

h1 {
  font-size: 40px;
  margin-top: 40px;
}

.names {
  font-size: 32px;
  margin: 20px 0;
  color: #b76e79;
}

.details {
  font-size: 18px;
  margin: 20px 0;
}

.footer {
  margin-top: 40px;
  font-size: 14px;
  color: #777;
}
</style>

</head>
<body>

<div class="container">
  <h1>You're Invited</h1>

  <div class="names">
    John & Mary
  </div>

  <div class="details">
    Together with their families,<br><br>
    invite you to celebrate their wedding<br><br>

    <strong>June 15, 2026</strong><br>
    3:00 PM<br><br>

    St. Mary's Church<br>
    Reception at Grand Hall
  </div>

  <div class="footer">
    Scan this QR to view invitation
  </div>
</div>

</body>
</html>
